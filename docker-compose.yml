version: "3.9"

services:
  clinicflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database and trained model outside the container
      - clinicflow_data:/app/data
      - clinicflow_model:/app/model
    environment:
      # ── Required for production ──────────────────────────
      SECRET_KEY: ${SECRET_KEY:-clinicflow-dev-change-me}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}

      # ── Google OAuth (get from console.cloud.google.com) ─
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # ── Firebase Phone Auth (get from console.firebase.google.com) ─
      FIREBASE_API_KEY:    ${FIREBASE_API_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/today-stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  clinicflow_data:
  clinicflow_model:
